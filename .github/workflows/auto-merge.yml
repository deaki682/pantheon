name: auto-merge

# Auto-merge claude/* feature branches to main after tests pass.
# Runs on every push to a claude/* branch. Fast-forward only — if main
# has diverged, the merge fails safely and you resolve manually.

on:
  push:
    branches:
      - 'claude/**'
      - '!claude/live'   # never merge the data branch

permissions:
  contents: write

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest

      - name: Run tests
        run: pytest tests/ -q --tb=short -x

      - name: Fast-forward main
        if: success()
        run: |
          git config user.email "auto-merge-bot@noreply.github.com"
          git config user.name "auto-merge-bot"

          git fetch origin main
          git checkout main

          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main (fast-forward only)"

          if git merge --ff-only "origin/$BRANCH"; then
            git push origin main
            echo "✓ Merged $BRANCH → main"
          else
            echo "Cannot fast-forward — main has diverged. Skipping."
            exit 0
          fi
