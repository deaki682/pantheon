<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{color-scheme:light dark;--bg:#fff;--fg:#1a1a1a;--muted:#6b7280;--line:#e5e7eb;--card:#f9fafb;
    --hi:#b91c1c;--hibg:#fee2e2;--med:#b45309;--medbg:#fef3c7;--lo:#15803d;--lobg:#dcfce7;--alertbg:#fef2f2;--alert:#b91c1c;}
  @media(prefers-color-scheme:dark){:root{--bg:#15171c;--fg:#e8e8ea;--muted:#9aa0ab;--line:#2a2f3a;--card:#1e2128;
    --hibg:#3a1414;--medbg:#3a2f12;--lobg:#12321c;--alertbg:#2a1414;}}
  *{box-sizing:border-box}
  body{width:420px;max-height:560px;overflow-y:auto;margin:0;font:13px/1.45 system-ui,sans-serif;background:var(--bg);color:var(--fg)}
  header{padding:12px 14px 8px;position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);z-index:2}
  h1{font-size:14px;margin:0}.sub{font-size:11px;color:var(--muted);margin:2px 0 0}
  .alert{margin:10px 14px 0;background:var(--alertbg);border:1px solid var(--alert);border-radius:10px;padding:10px 12px}
  .alert h2{font-size:12px;margin:0 0 6px;color:var(--alert)}
  .alert .item{font-size:12px;margin:4px 0}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;vertical-align:middle}
  .high{background:var(--hibg);color:var(--hi)}.medium{background:var(--medbg);color:var(--med)}.low{background:var(--lobg);color:var(--lo)}
  ul.list{list-style:none;margin:8px 0 0;padding:0 8px}
  li.ext{border:1px solid var(--line);border-radius:10px;margin:6px 6px;padding:9px 11px;background:var(--card)}
  .ext .row{display:flex;align-items:center;gap:8px;cursor:pointer}
  .ext .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ext .why{margin:8px 0 0;padding-left:16px;font-size:12px;color:var(--muted)}
  .ext .why li{margin:3px 0}
  .foot{padding:10px 14px;color:var(--muted);font-size:11px;border-top:1px solid var(--line);margin-top:8px}
  .empty{padding:24px 14px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
  <header>
    <h1>Extension Sentinel</h1>
    <p class="sub">What each extension can access — ranked by risk. Nothing leaves your machine.</p>
  </header>
  <div id="alerts"></div>
  <ul id="list" class="list"></ul>
  <div class="foot" id="foot"></div>
  <script src="core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
